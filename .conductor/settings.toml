# Conductor repository settings — shared with the team.
# Docs: https://conductor.build/docs/reference/settings
"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Lifecycle scripts.
[scripts]
setup    = "bun install"   # on workspace create: install dependencies
run_mode = "concurrent"

[scripts.run.dev]
command = "bun run dev --port $CONDUCTOR_PORT"
default = true
icon    = "play"

[scripts.run.storybook]
command = "bun run storybook -p $CONDUCTOR_PORT"
icon    = "book-open"

# Git workflow defaults.
[git]
archive_on_merge = true

# Action prompts — encode the repo's PR & branch conventions for every teammate's agent.
[prompts]
rename_branch = "Branch names should match ^(feat|feature|fix|hotfix|refactor|breaking|chore|docs)/[a-z0-9-]+$ — i.e. {type}/{kebab-title}, e.g. feat/add-contact-form. Use Conventional Commit types; no username or ticket prefix."

general = """
Quality bar for every change:
- Keep the codebase clean, maintainable, scalable, and easy to understand — this is the primary objective.
- Research relevant best practices for the changes you make (including external sources when beneficial) and actively look for opportunities to simplify the implementation.
- This is Next.js 16 with breaking changes from earlier versions — read the relevant guide in node_modules/next/dist/docs/ before writing code, and heed deprecation notices.
- Keep UI work consistent with the existing design system (shadcn, Tailwind v4, next-themes) and keep all user-facing strings translatable via next-intl (messages/*).

When the work is complete:
- Run and pass the repo checks before requesting review or merging: `bun run lint`, `bun run typecheck`, `bun run format:check`, `bun run knip`, and `bun run build`.
- Update the pull request description so it accurately reflects the current implementation: include all actual changes and remove any outdated information from previous iterations. Treat the PR description as a living document.
- Verify these are updated when applicable: AGENTS.md, README, Storybook stories, i18n message catalogs (messages/*), and landing page content.

Committing & pushing (only when explicitly asked — always ask before pushing to git):
1. Stage, commit with a Conventional Commits message, and push the feature branch.
2. If this change added, changed, or removed user-facing or scope behavior AND a PR exists for the branch (`gh pr view --json number`), UPDATE the PR description in the same turn so it matches the working tree: refresh the "User-facing changes" and "How to verify" sections and delete anything no longer true. If no PR exists, skip this step.
3. When editing a PR body, preserve auto-generated blocks (e.g. CodeRabbit `<!-- … -->`): read the current body with `gh pr view <n> --json body -q .body`, replace only the human-authored part, then `gh pr edit <n> --body-file <file>`.
"""

create_pr = """
Create the PR with `gh pr create --base main --body-file <file>`.
Target the main branch. Use a Conventional Commit title, e.g. 'feat: short description'. Types: feat, fix, chore, refactor, docs, test.

